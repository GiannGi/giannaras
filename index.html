<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vertical AI Project</title>
    <style>
        /* Κλείδωμα οθόνης */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden !important; position: fixed;
            background: #000; display: flex;
            justify-content: center; align-items: center;
            touch-action: none;
        }

        /* Container για κάθετο προσανατολισμό */
        #page-wrapper {
            position: relative;
            width: 1080px; /* Κάθετο πλάτος */
            height: 1920px; /* Κάθετο ύψος */
            transform-origin: center center;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        #contentIFrame {
            width: 1080px !important;
            height: 1920px !important;
            border: none;
            display: block;
        }

        /* Κουμπιά πλοήγησης στο κάτω μέρος για ευκολία σε κάθετο σχεδιασμό */
        .nav-btn {
            position: fixed;
            bottom: 20px; /* Τα μεταφέραμε κάτω για να μην κρύβουν το περιεχόμενο */
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 25px;
            cursor: pointer;
            z-index: 99999;
            font-size: 30px;
            border-radius: 50px;
            user-select: none;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .prev { left: 20px; }
        .next { right: 20px; }

        #dummyIFrame { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="page-wrapper">
        <iframe id="contentIFrame" 
                src="publication-web-resources/html/publication.html" 
                scrolling="no">
        </iframe>
    </div>

    <div class="nav-btn prev" onclick="showPreviousPage()">❮</div>
    <div class="nav-btn next" onclick="showNextPage()">❯</div>

    <script>
        function applyVerticalScale() {
            const wrapper = document.getElementById('page-wrapper');
            // Ορίζουμε τις κάθετες διαστάσεις στόχο
            const targetW = 1080;
            const targetH = 1920;
            
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            
            // Υπολογισμός κλίμακας: Πρέπει να χωράει και στα δύο, 
            // αλλά κυρίως στο ύψος (Height) για κάθετες σελίδες.
            const scale = Math.min(screenW / targetW, screenH / targetH);
            
            wrapper.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', applyVerticalScale);
        window.addEventListener('load', applyVerticalScale);
        // Διπλή εκτέλεση για σιγουριά στα κινητά
        applyVerticalScale();
        setTimeout(applyVerticalScale, 300);

        // Απαγόρευση scroll και gestures
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
