<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <!-- ΚΛΕΙΔΩΜΑ ZOOM: Απαγορεύει στον χρήστη να κάνει scale με τα δάχτυλα ή διπλό κλικ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vertical AI Project</title>
    <style>
        /* ΠΛΗΡΕΣ ΚΛΕΙΔΩΜΑ ΚΙΝΗΣΗΣ */
        html, body {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            overflow: hidden !important; 
            position: fixed; /* Κλειδώνει τη σελίδα στη θέση της */
            background: #000; 
            display: flex;
            justify-content: center; 
            align-items: center;
            
            /* ΑΠΕΝΕΡΓΟΠΟΙΗΣΗ GESTURES (Κινητά & Mac) */
            touch-action: none; /* Σταματάει το swipe και το double-tap zoom */
            -ms-touch-action: none;
            overscroll-behavior: none; /* Σταματάει το "λαστιχένιο" εφέ */
            -webkit-user-select: none; /* Απαγόρευση επιλογής κειμένου */
            user-select: none;
        }

        #page-wrapper {
            position: relative;
            width: 1080px; 
            height: 1920px; 
            transform-origin: center center;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            overflow: hidden;
            /* Διασφαλίζει ότι το iframe δεν θα δεχτεί gestures που επηρεάζουν τον browser */
            touch-action: none;
        }

        #contentIFrame {
            width: 1080px !important;
            height: 1920px !important;
            border: none;
            display: block;
            pointer-events: auto; /* Επιτρέπει μόνο τα κλικ μέσα στο περιεχόμενο */
        }

        #dummyIFrame { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="page-wrapper">
        <iframe id="contentIFrame" 
                src="publication-web-resources/html/publication.html" 
                scrolling="no">
        </iframe>
    </div>

    <iframe id="dummyIFrame" class="dummyFrameClass"></iframe>

    <script>
        function applyVerticalScale() {
            const wrapper = document.getElementById('page-wrapper');
            const targetW = 1080;
            const targetH = 1920;
            const screenW = window.innerWidth;
            const screenH = window.innerHeight;
            const scale = Math.min(screenW / targetW, screenH / targetH);
            wrapper.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', applyVerticalScale);
        window.addEventListener('load', applyVerticalScale);
        applyVerticalScale();
        setTimeout(applyVerticalScale, 300);

        // 1. ΑΠΑΓΟΡΕΥΣΗ SWIPE & SCROLL (Κινητά)
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // 2. ΑΠΑΓΟΡΕΥΣΗ DOUBLE-TAP ZOOM (iOS fix)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 3. ΑΠΑΓΟΡΕΥΣΗ ΡΟΔΕΛΑΣ & ΠΛΗΚΤΡΟΛΟΓΙΟΥ (PC/Mac)
        window.addEventListener('wheel', e => e.preventDefault(), { passive: false });
        window.addEventListener('keydown', function(e) {
            const keys = [32, 37, 38, 39, 40]; // Space, βελάκια
            if (keys.includes(e.keyCode)) e.preventDefault();
        }, false);
    </script>
</body>
</html>
