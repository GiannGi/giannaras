<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vertical AI Project - Fixed</title>
    <style>
        /* Καθαρό κλείδωμα χωρίς να επηρεάζει το μέγεθος */
        html, body {
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            overflow: hidden !important;
            background: #000;
            display: flex;
            justify-content: center; align-items: center;
            /* Κλείδωμα κίνησης */
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #page-wrapper {
            position: absolute;
            width: 1080px; 
            height: 1920px; 
            transform-origin: center center;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        #contentIFrame {
            width: 1080px !important;
            height: 1920px !important;
            border: none;
            display: block;
        }

        #dummyIFrame { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="page-wrapper">
        <iframe id="contentIFrame" 
                src="publication-web-resources/html/publication.html" 
                scrolling="no">
        </iframe>
    </div>

    <iframe id="dummyIFrame" class="dummyFrameClass"></iframe>

    <script>
        function applyVerticalScale() {
            const wrapper = document.getElementById('page-wrapper');
            const targetW = 1080;
            const targetH = 1920;
            
            // Χρησιμοποιούμε το clientWidth/Height για ακρίβεια στα κινητά
            const screenW = document.documentElement.clientWidth;
            const screenH = document.documentElement.clientHeight;
            
            const scale = Math.min(screenW / targetW, screenH / targetH);
            
            wrapper.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', applyVerticalScale);
        window.addEventListener('load', applyVerticalScale);
        window.addEventListener('orientationchange', applyVerticalScale);
        
        applyVerticalScale();
        // Διπλό τσεκάρισμα μετά από λίγο για να "κάτσει" το UI του κινητού
        setTimeout(applyVerticalScale, 300);

        // Κλείδωμα Scroll (Κινητά)
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        // Κλείδωμα Double-Tap Zoom
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        // Κλείδωμα Ροδέλας (PC)
        window.addEventListener('wheel', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
